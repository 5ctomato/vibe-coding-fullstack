<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Vibe Coding | Edit Post #' + ${post.no}">Vibe Coding | Edit Post</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#135bec',
                        'background-dark': '#0a0a0c',
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }

        function savePost() {
            alert('저장되었습니다.');
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .readonly-input {
            background: rgba(255, 255, 255, 0.02);
            color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="bg-[#0a0a0c] text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-3xl w-full glass-panel rounded-3xl p-8 md:p-12">
        <h1 class="text-4xl font-bold mb-8 tracking-tighter">Edit <span class="text-primary">Post</span></h1>

        <form th:action="@{/posts/{no}/save(no=${post.no})}" th:object="${postUpdateDto}" method="POST"
            class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Post
                        Number</label>
                    <input type="text" th:value="${post.no}" readonly
                        class="w-full readonly-input border border-white/5 rounded-xl px-4 py-3 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Views</label>
                    <input type="text" th:value="${post.views}" readonly
                        class="w-full readonly-input border border-white/5 rounded-xl px-4 py-3 focus:outline-none transition-all">
                </div>
            </div>

            <div>
                <label for="title"
                    class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Title</label>
                <input type="text" id="title" th:field="*{title}"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="Enter post title">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="mt-1 text-rose-400 text-sm"></p>
            </div>

            <div>
                <label for="content"
                    class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Content</label>
                <textarea id="content" th:field="*{content}" rows="8"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="Write your thoughts..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Created
                        At</label>
                    <input type="text" th:value="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}" readonly
                        class="w-full readonly-input border border-white/5 rounded-xl px-4 py-3 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Updated
                        At</label>
                    <input type="text"
                        th:value="${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd') : ''}"
                        readonly
                        class="w-full readonly-input border border-white/5 rounded-xl px-4 py-3 focus:outline-none transition-all">
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 pt-6">
                <button type="submit"
                    class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    저장
                </button>
                <a th:href="@{/posts/{no}(no=${post.no})}"
                    class="flex-1 bg-white/5 hover:bg-white/10 text-center text-white font-medium py-4 rounded-xl border border-white/10 transition-all flex items-center justify-center gap-2">
                    취소
                </a>
            </div>
        </form>
    </div>
</body>

</html>
