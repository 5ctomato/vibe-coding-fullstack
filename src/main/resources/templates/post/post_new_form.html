<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding | New Post</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#135bec',
                        'background-dark': '#0a0a0c',
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }

        function registerPost() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            if (title === '' || content === '') {
                return; // HTML5 required validation will handle this
            }

            alert('새 게시글 등록');
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body class="bg-[#0a0a0c] text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full glass-panel rounded-2xl p-8 md:p-12">
        <h1 class="text-4xl font-bold mb-8 tracking-tighter">New <span class="text-primary">Post</span></h1>

        <form th:action="@{/posts/add}" th:object="${postCreateDto}" method="POST" class="space-y-6">
            <div>
                <label for="title"
                    class="block text-sm font-medium text-gray-400 mb-2 uppercase tracking-widest">Title</label>
                <input type="text" id="title" th:field="*{title}"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="Enter post title">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="mt-1 text-rose-400 text-sm"></p>
            </div>

            <div>
                <label for="content"
                    class="block text-sm font-medium text-gray-400 mb-2 uppercase tracking-widest">Content</label>
                <textarea id="content" th:field="*{content}" rows="6"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="Write your thoughts..."></textarea>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                    class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-primary/20">
                    Register
                </button>
                <a href="/posts"
                    class="flex-1 bg-white/5 hover:bg-white/10 text-center text-white font-medium py-3 rounded-lg border border-white/10 transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>

</html>
